<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contrast Finance 2.0</title>
  <link rel="stylesheet" href="/web/styles.css?v=0.35.78" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar brand-topbar">
      <div class="brand-block">
        <img class="brand-logo" src="/web/contrast-logo.jpg" alt="Contrast" />
        <div>
          <div class="eyebrow">Contrast Finance 2.0</div>
          <h1 id="pageTitle">Вход</h1>
          <p id="pageSubtitle" class="header-subtitle">Финансовая панель мероприятий</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="userBadge" class="badge hidden"></span>
        <button id="logoutBtn" class="ghost hidden">Выйти</button>
      </div>
    </header>

    <main>
      <section id="loginScreen" class="card narrow auth-card">
        <img class="auth-logo" src="/web/contrast-logo.jpg" alt="Contrast" />
        <div class="auth-eyebrow">Экономика мероприятий</div>
        <h2 class="auth-title">Делаем больше, чем просто сметы</h2>
        <h3 class="auth-subtitle">Вход в систему</h3>

        <div class="auth-tabs" role="tablist" aria-label="Тип входа">
          <button class="auth-tab active" type="button" data-auth-mode="manager">Вход</button>
          <button class="auth-tab" type="button" data-auth-mode="admin">Админ</button>
          <button class="auth-tab" type="button" data-auth-mode="department_head">Глав Деп</button>
        </div>

        <label id="loginNameLabel">Имя менеджера
          <input id="loginName" autocomplete="username" placeholder="Имя" />
        </label>

        <label>PIN-код
          <input id="loginPin" autocomplete="current-password" type="password" placeholder="••••" />
        </label>

        <button id="loginBtn" type="button">Войти</button>
        <div id="loginError" class="error hidden"></div>
      </section>

      <section id="dashboardScreen" class="hidden">
        <div class="toolbar">
          <label class="month-control">Месяц
            <select id="monthSelect"></select>
          </label>
          <label class="month-control year-control">Год
            <select id="yearSelect"></select>
          </label>
          <button id="reloadBtn" class="secondary">Обновить</button>
          <button id="changePinOpenBtn" class="ghost">Сменить PIN</button>
        </div>

        <section id="summaryCards" class="grid cards"></section>

        <section class="card">
          <div class="section-head">
            <h2 id="dashboardTitle">Кабинет</h2>
            <span id="dashboardHint" class="muted"></span>
          </div>
          <div id="adminTabs" class="tabs hidden"></div>
          <div id="dashboardContent"></div>
        </section>

        <div id="eventModalBackdrop" class="modal-backdrop hidden">
          <div class="modal">
            <div class="modal-head">
              <div>
                <div class="eyebrow">Мероприятие</div>
                <h2 id="eventModalTitle">Детали</h2>
              </div>
              <button id="eventModalCloseBtn" class="ghost">Закрыть</button>
            </div>
            <div id="eventModalContent"></div>
          </div>
        </div>

        <div id="plansModalBackdrop" class="modal-backdrop hidden">
          <div class="modal">
            <div class="modal-head">
              <div>
                <div class="eyebrow">Планы</div>
                <h2>Задать планы</h2>
              </div>
              <button id="plansModalCloseBtn" class="ghost">Закрыть</button>
            </div>
            <div id="plansModalContent"></div>
          </div>
        </div>

        <section id="changePinCard" class="card narrow hidden">
          <h2>Смена PIN</h2>
          <label>Старый PIN
            <input id="oldPin" type="password" />
          </label>
          <label>Новый PIN
            <input id="newPin" type="password" />
          </label>
          <button id="changePinBtn">Сменить PIN</button>
          <div id="changePinMessage" class="muted"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="loading-dot"></div>
      <div>
        <strong>Загрузка</strong>
        <span>Обновляем данные…</span>
      </div>
    </div>
  </div>

  <script src="/web/app.js?v=0.35.78"></script>
</body>
</html>
